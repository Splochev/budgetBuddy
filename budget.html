<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BudgetBudy</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg"/>
    <link rel="stylesheet" href="./css/app.css"/>
  </head>

  <body>
    <div x-data x-init="$store.budget.init()" style="display:flex;flex-direction:column;height:100vh">

      <!-- ══ LOADING ══════════════════════════════════════════════ -->
      <div x-show="$store.budget.loading"
        style="display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg)">
        <div style="text-align:center;color:var(--text3)">
          <svg style="width:40px;height:40px;color:var(--accent);animation:pulse 1.5s infinite;margin-bottom:12px"
            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="6" width="20" height="14" rx="2"/><path d="M2 10h20"/>
            <circle cx="16" cy="16" r="1.5" fill="currentColor" stroke="none"/>
          </svg>
          <p style="font-size:0.9rem" x-text="$store.budget.t('loading')"></p>
        </div>
      </div>

      <!-- ══ APP SHELL ════════════════════════════════════════════ -->
      <template x-if="!$store.budget.loading">
        <div style="display:flex;flex-direction:column;height:100vh">

          <!-- ── TOP BAR ──────────────────────────────────────── -->
          <header id="topbar" style="display:flex;align-items:center;gap:10px;padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;">
            <button class="btn-icon" @click="$store.budget.sidebarOpen = !$store.budget.sidebarOpen">
              <svg style="width:18px;height:18px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
            </button>
            <div style="display:flex;align-items:center;gap:8px;font-size:1.1rem;font-weight:700;color:var(--accent);letter-spacing:-0.5px;flex-shrink:0;">
              <svg style="width:22px;height:22px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="6" width="20" height="14" rx="2"/><path d="M2 10h20"/>
                <circle cx="16" cy="16" r="1.5" fill="currentColor" stroke="none"/>
              </svg>
              BudgetBudy
            </div>
            <nav style="display:flex;gap:4px;margin-left:8px">
              <a href="https://splochev.github.io/DietBudy/food-manager.html"
                style="display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:4px;font-size:0.8rem;font-weight:500;color:var(--text3);text-decoration:none;transition:var(--trans)"
                onmouseover="this.style.color='var(--text)';this.style.background='var(--surface2)'"
                onmouseout="this.style.color='var(--text3)';this.style.background='transparent'">
                <svg style="width:14px;height:14px;flex-shrink:0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="6" y1="2" x2="6" y2="9"/>
                  <line x1="9" y1="2" x2="9" y2="9"/>
                  <path d="M6 9 Q7.5 12 9 9"/>
                  <line x1="7.5" y1="12" x2="7.5" y2="22"/>
                  <ellipse cx="16.5" cy="6" rx="2.5" ry="4"/>
                  <line x1="16.5" y1="10" x2="16.5" y2="22"/>
                </svg>
                <span x-text="$store.budget.lang === 'bg' ? 'Храни' : 'Foods'"></span>
              </a>
              <a href="https://splochev.github.io/DietBudy/planner.html"
                style="display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:4px;font-size:0.8rem;font-weight:500;color:var(--text3);text-decoration:none;transition:var(--trans)"
                onmouseover="this.style.color='var(--text)';this.style.background='var(--surface2)'"
                onmouseout="this.style.color='var(--text3)';this.style.background='transparent'">
                <svg style="width:14px;height:14px;flex-shrink:0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="4" width="18" height="18" rx="2"/>
                  <line x1="16" y1="2" x2="16" y2="6"/>
                  <line x1="8" y1="2" x2="8" y2="6"/>
                  <line x1="3" y1="10" x2="21" y2="10"/>
                  <line x1="8" y1="14" x2="16" y2="14"/>
                </svg>
                <span x-text="$store.budget.lang === 'bg' ? 'Планер' : 'Planner'"></span>
              </a>
              <a href="https://splochev.github.io/GymBudy/workout.html"
                style="display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:4px;font-size:0.8rem;font-weight:500;color:var(--text3);text-decoration:none;transition:var(--trans)"
                onmouseover="this.style.color='var(--text)';this.style.background='var(--surface2)'"
                onmouseout="this.style.color='var(--text3)';this.style.background='transparent'">
                <svg style="width:13px;height:13px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="9" width="3" height="6" rx="1"/><rect x="19" y="9" width="3" height="6" rx="1"/><rect x="5" y="7" width="3" height="10" rx="1"/><rect x="16" y="7" width="3" height="10" rx="1"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                <span x-text="$store.budget.lang === 'bg' ? 'Тренировки' : 'Workouts'"></span>
              </a>
              <a href="./budget.html"
                style="display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:4px;font-size:0.8rem;font-weight:500;color:var(--text3);text-decoration:none;transition:var(--trans)"
                onmouseover="this.style.color='var(--text)';this.style.background='var(--surface2)'"
                onmouseout="this.style.color='var(--text3)';this.style.background='transparent'">
                <svg style="width:14px;height:14px;flex-shrink:0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="2" y="6" width="20" height="14" rx="2"/><path d="M2 10h20"/>
                  <circle cx="16" cy="16" r="1.5" fill="currentColor" stroke="none"/>
                </svg>
                <span x-text="$store.budget.lang === 'bg' ? 'Бюджет' : 'Budget'"></span>
              </a>
            </nav>
            <div style="flex:1"></div>
            <div x-show="$store.budget.saving" style="display:flex;align-items:center;gap:5px;font-size:0.72rem;color:var(--warning)">
              <div class="save-dot dot-saving"></div>
            </div>
            <button class="btn btn-ghost btn-sm" @click="$store.budget.setLang($store.budget.lang === 'en' ? 'bg' : 'en')"
              style="font-size:0.75rem;font-weight:700;padding:4px 10px;letter-spacing:0.5px"
              x-text="$store.budget.lang === 'en' ? 'EN' : 'BG'"></button>
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:0.8rem;color:var(--text3)" x-text="$store.budget.user?.displayName || $store.budget.user?.email?.split('@')[0]"></span>
              <button class="btn-icon" @click="$store.budget.logout()">
                <svg style="width:16px;height:16px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              </button>
            </div>
          </header>

          <!-- ── BODY ──────────────────────────────────────────── -->
          <div style="display:flex;flex:1;overflow:hidden;position:relative">

            <!-- Sidebar -->
            <aside id="sidebar" :class="{ open: $store.budget.sidebarOpen }"
              style="background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden">
              <div style="padding:14px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:2px">

                <!-- Mobile close + cross-app nav -->
                <div class="sidebar-mobile-header" style="display:none;flex-direction:column;flex-shrink:0;margin:-14px -14px 10px">
                  <!-- Brand row -->
                  <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border)">
                    <div style="display:flex;align-items:center;gap:8px;font-weight:700;color:var(--accent);font-size:0.95rem">
                      <svg style="width:18px;height:18px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="6" width="20" height="14" rx="2"/><path d="M2 10h20"/><circle cx="16" cy="16" r="1.5" fill="currentColor" stroke="none"/>
                      </svg>BudgetBudy
                    </div>
                    <button class="btn-icon" @click="$store.budget.sidebarOpen=false">
                      <svg style="width:16px;height:16px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                    </button>
                  </div>
                  <!-- Cross-app navigation -->
                  <nav style="display:flex;flex-direction:column;padding:8px;border-bottom:1px solid var(--border);gap:2px">
                    <a href="https://splochev.github.io/DietBudy/food-manager.html"
                      style="display:flex;align-items:center;gap:10px;padding:12px;border-radius:var(--radius);font-size:0.875rem;font-weight:600;color:var(--text3);text-decoration:none;transition:var(--trans)"
                      onmouseover="this.style.color='var(--text)';this.style.background='var(--surface2)'"
                      onmouseout="this.style.color='var(--text3)';this.style.background='transparent'">
                      <svg style="width:16px;height:16px;flex-shrink:0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="6" y1="2" x2="6" y2="9"/><line x1="9" y1="2" x2="9" y2="9"/><path d="M6 9 Q7.5 12 9 9"/><line x1="7.5" y1="12" x2="7.5" y2="22"/><ellipse cx="16.5" cy="6" rx="2.5" ry="4"/><line x1="16.5" y1="10" x2="16.5" y2="22"/>
                      </svg>
                      <span x-text="$store.budget.lang === 'bg' ? 'Храни' : 'Foods'"></span>
                    </a>
                    <a href="https://splochev.github.io/DietBudy/planner.html"
                      style="display:flex;align-items:center;gap:10px;padding:12px;border-radius:var(--radius);font-size:0.875rem;font-weight:600;color:var(--text3);text-decoration:none;transition:var(--trans)"
                      onmouseover="this.style.color='var(--text)';this.style.background='var(--surface2)'"
                      onmouseout="this.style.color='var(--text3)';this.style.background='transparent'">
                      <svg style="width:16px;height:16px;flex-shrink:0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/>
                      </svg>
                      <span x-text="$store.budget.lang === 'bg' ? 'Планер' : 'Planner'"></span>
                    </a>
                    <a href="https://splochev.github.io/GymBudy/workout.html"
                      style="display:flex;align-items:center;gap:10px;padding:12px;border-radius:var(--radius);font-size:0.875rem;font-weight:600;color:var(--text3);text-decoration:none;transition:var(--trans)"
                      onmouseover="this.style.color='var(--text)';this.style.background='var(--surface2)'"
                      onmouseout="this.style.color='var(--text3)';this.style.background='transparent'">
                      <svg style="width:16px;height:16px;flex-shrink:0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="9" width="3" height="6" rx="1"/><rect x="19" y="9" width="3" height="6" rx="1"/><rect x="5" y="7" width="3" height="10" rx="1"/><rect x="16" y="7" width="3" height="10" rx="1"/><line x1="8" y1="12" x2="16" y2="12"/>
                      </svg>
                      <span x-text="$store.budget.lang === 'bg' ? 'Тренировки' : 'Workouts'"></span>
                    </a>
                    <a href="./budget.html"
                      @click="$store.budget.sidebarOpen=false"
                      style="display:flex;align-items:center;gap:10px;padding:12px;border-radius:var(--radius);font-size:0.875rem;font-weight:600;background:var(--accent-bg);color:var(--accent);text-decoration:none">
                      <svg style="width:16px;height:16px;flex-shrink:0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="6" width="20" height="14" rx="2"/><path d="M2 10h20"/><circle cx="16" cy="16" r="1.5" fill="currentColor" stroke="none"/>
                      </svg>
                      <span x-text="$store.budget.lang === 'bg' ? 'Бюджет' : 'Budget'"></span>
                    </a>
                  </nav>
                </div>

                <div style="font-size:0.65rem;text-transform:uppercase;letter-spacing:0.6px;color:var(--text3);padding:4px 12px 4px;font-weight:600">Menu</div>

                <!-- Dashboard -->
                <div class="sidebar-item" :class="{ active: $store.budget.activeView === 'dashboard' }" @click="$store.budget.navigate('dashboard')">
                  <div style="display:flex;align-items:center;gap:9px">
                    <svg style="width:15px;height:15px;flex-shrink:0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    <span x-text="$store.budget.t('nav_dashboard')"></span>
                  </div>
                </div>

                <!-- Monthly Tracker -->
                <div class="sidebar-item" :class="{ active: $store.budget.activeView === 'tracker' }" @click="$store.budget.navigate('tracker')">
                  <div style="display:flex;align-items:center;gap:9px">
                    <svg style="width:15px;height:15px;flex-shrink:0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
                    <span x-text="$store.budget.t('nav_tracker')"></span>
                  </div>
                  <span x-show="$store.budget.unpaidObligations > 0" class="badge badge-danger" style="font-size:0.62rem;padding:2px 6px"
                    x-text="$store.budget.fmtC($store.budget.unpaidObligations)"></span>
                </div>

                <!-- Transactions -->
                <div class="sidebar-item" :class="{ active: $store.budget.activeView === 'transactions' }" @click="$store.budget.navigate('transactions')">
                  <div style="display:flex;align-items:center;gap:9px">
                    <svg style="width:15px;height:15px;flex-shrink:0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
                    <span x-text="$store.budget.t('nav_transactions')"></span>
                  </div>
                  <span x-show="$store.budget.transactions.length" class="badge badge-accent" style="font-size:0.62rem;padding:2px 6px" x-text="$store.budget.transactions.length"></span>
                </div>

                <!-- Income -->
                <div class="sidebar-item" :class="{ active: $store.budget.activeView === 'income' }" @click="$store.budget.navigate('income')">
                  <div style="display:flex;align-items:center;gap:9px">
                    <svg style="width:15px;height:15px;flex-shrink:0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
                    <span x-text="$store.budget.t('nav_income')"></span>
                  </div>
                </div>

                <!-- Fixed Expenses -->
                <div class="sidebar-item" :class="{ active: $store.budget.activeView === 'fixed' }" @click="$store.budget.navigate('fixed')">
                  <div style="display:flex;align-items:center;gap:9px">
                    <svg style="width:15px;height:15px;flex-shrink:0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6l3 3 3-3 3 3 3-3 3 3M3 18l3-3 3 3 3-3 3 3 3-3"/></svg>
                    <span x-text="$store.budget.t('nav_fixed')"></span>
                  </div>
                </div>

                <!-- Categories -->
                <div class="sidebar-item" :class="{ active: $store.budget.activeView === 'categories' }" @click="$store.budget.navigate('categories')">
                  <div style="display:flex;align-items:center;gap:9px">
                    <svg style="width:15px;height:15px;flex-shrink:0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                    <span x-text="$store.budget.t('nav_categories')"></span>
                  </div>
                </div>

                <!-- Projects -->
                <div class="sidebar-item" :class="{ active: $store.budget.activeView === 'projects' }" @click="$store.budget.navigate('projects')">
                  <div style="display:flex;align-items:center;gap:9px">
                    <svg style="width:15px;height:15px;flex-shrink:0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
                    <span x-text="$store.budget.t('nav_projects')"></span>
                  </div>
                  <span x-show="$store.budget.projects.length" class="badge" style="font-size:0.62rem;padding:2px 6px" x-text="$store.budget.projects.length"></span>
                </div>

                <div style="flex:1"></div>

                <!-- Sidebar balance widget -->
                <div style="border-top:1px solid var(--border);padding-top:12px;margin-top:8px">
                  <div style="font-size:0.62rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);margin-bottom:6px;font-weight:600">FREE MONEY</div>
                  <div style="font-size:1.3rem;font-weight:900;letter-spacing:-1px"
                    :style="{ color: $store.budget.freeBalance >= 0 ? 'var(--accent)' : 'var(--danger)' }"
                    x-text="$store.budget.fmtC($store.budget.freeBalance)"></div>
                  <div style="font-size:0.68rem;color:var(--text3);margin-top:2px" x-text="'of ' + $store.budget.fmtC($store.budget.totalBalance) + ' total'"></div>
                </div>

                <!-- Lang + user/logout -->
                <div style="border-top:1px solid var(--border);padding-top:10px;margin-top:10px;display:flex;align-items:center;justify-content:space-between;gap:8px">
                  <button class="btn btn-ghost btn-sm" @click="$store.budget.setLang($store.budget.lang === 'en' ? 'bg' : 'en')" style="font-size:0.75rem;font-weight:700;padding:4px 10px;letter-spacing:0.5px" x-text="$store.budget.lang === 'en' ? 'EN' : 'BG'"></button>
                  <div style="display:flex;align-items:center;gap:8px;min-width:0">
                    <span style="font-size:0.8rem;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" x-text="$store.budget.user?.displayName || $store.budget.user?.email?.split('@')[0]"></span>
                    <button class="btn-icon" @click="$store.budget.logout()">
                      <svg style="width:16px;height:16px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    </button>
                  </div>
                </div>

              </div>
            </aside>
            <div id="sidebar-overlay" @click="$store.budget.sidebarOpen=false"></div>

            <!-- ── MAIN ───────────────────────────────────────── -->
            <main id="main-content" style="flex:1;overflow-y:auto;padding:28px 32px">

              <!-- ════════════════════════════════════════════════
                   DASHBOARD VIEW
              ════════════════════════════════════════════════ -->
              <div x-show="$store.budget.activeView === 'dashboard'">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px">
                  <div>
                    <h1 style="font-size:1.35rem;font-weight:800;letter-spacing:-0.5px" x-text="$store.budget.t('nav_dashboard')"></h1>
                    <p style="color:var(--text3);font-size:0.82rem;margin-top:2px" x-text="$store.budget.fmtMonthYear($store.budget.filterMonth)"></p>
                  </div>
                  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
                    <select x-model="$store.budget.filterMonth" style="font-size:0.8rem;padding:6px 26px 6px 10px;flex:1;min-width:130px">
                      <template x-for="m in $store.budget.monthOptions" :key="m">
                        <option :value="m" x-text="$store.budget.fmtMonthYear(m)"></option>
                      </template>
                    </select>
                    <button class="btn btn-primary" @click="$store.budget.openAddTransaction('income')">
                      <svg style="width:13px;height:13px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                      <span x-text="$store.budget.t('add_income')"></span>
                    </button>
                    <button class="btn btn-secondary" @click="$store.budget.openAddTransaction('expense')">
                      <svg style="width:13px;height:13px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/></svg>
                      <span x-text="$store.budget.t('add_expense')"></span>
                    </button>
                  </div>
                </div>

                <!-- ★ FREE MONEY BREAKDOWN — the main card ★ -->
                <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px">
                  <!-- Hero row -->
                  <div style="padding:22px 28px;background:linear-gradient(135deg,rgba(34,197,94,0.05) 0%,transparent 60%)">
                    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap">
                      <div>
                        <div style="font-size:0.68rem;text-transform:uppercase;letter-spacing:0.6px;color:var(--text3);font-weight:600;margin-bottom:4px">FREE MONEY (NET)</div>
                        <div style="font-size:3rem;font-weight:900;letter-spacing:-2px;line-height:1"
                          :style="{ color: $store.budget.freeBalance >= 0 ? 'var(--accent)' : 'var(--danger)' }"
                          x-text="$store.budget.fmtC($store.budget.freeBalance)"></div>
                        <div style="font-size:0.78rem;color:var(--text3);margin-top:8px">
                          balance − obligations − locked allocations
                        </div>
                      </div>
                      <button class="btn btn-secondary btn-sm" @click="$store.budget.openEditBalance()" style="flex-shrink:0">
                        <svg style="width:12px;height:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        Update Balance
                      </button>
                    </div>
                  </div>

                  <!-- Breakdown rows -->
                  <div style="border-top:1px solid var(--border)">
                    <!-- Bank balance -->
                    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 28px;border-bottom:1px solid var(--border)">
                      <div style="display:flex;align-items:center;gap:10px">
                        <div style="width:8px;height:8px;border-radius:50%;background:var(--accent)"></div>
                        <span style="font-size:0.85rem">Bank balance</span>
                        <span style="font-size:0.72rem;color:var(--text3)" x-show="$store.budget.settings.balanceDate">
                          as of <span x-text="$store.budget.fmtDate($store.budget.settings.balanceDate)"></span>
                        </span>
                      </div>
                      <span style="font-size:0.95rem;font-weight:700;color:var(--accent)" x-text="$store.budget.fmtC($store.budget.totalBalance)"></span>
                    </div>

                    <!-- Unpaid obligations -->
                    <div style="border-bottom:1px solid var(--border)">
                      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 28px">
                        <div style="display:flex;align-items:center;gap:10px">
                          <div style="width:8px;height:8px;border-radius:50%;background:var(--danger)"></div>
                          <span style="font-size:0.85rem">Unpaid obligations this month</span>
                        </div>
                        <span style="font-size:0.95rem;font-weight:700;color:var(--danger)"
                          x-text="'−' + $store.budget.fmtC($store.budget.unpaidObligations)"></span>
                      </div>
                      <!-- Detail rows -->
                      <template x-for="item in $store.budget.unpaidDetail" :key="item.fixedId">
                        <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 28px 6px 48px;border-top:1px solid var(--border)"
                          onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background='transparent'">
                          <span style="font-size:0.78rem;color:var(--text3)" x-text="item.name"></span>
                          <span style="font-size:0.8rem;color:var(--danger)" x-text="'−' + $store.budget.fmtC(item.amount)"></span>
                        </div>
                      </template>
                    </div>

                    <!-- Locked allocations -->
                    <div style="border-bottom:1px solid var(--border)">
                      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 28px">
                        <div style="display:flex;align-items:center;gap:10px">
                          <div style="width:8px;height:8px;border-radius:50%;background:var(--warning)"></div>
                          <span style="font-size:0.85rem">Locked allocations</span>
                        </div>
                        <span style="font-size:0.95rem;font-weight:700;color:var(--warning)"
                          x-text="'−' + $store.budget.fmtC($store.budget.projectAllocations)"></span>
                      </div>
                      <template x-for="a in $store.budget.allocationDetail" :key="a.projectId">
                        <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 28px 6px 48px;border-top:1px solid var(--border)"
                          onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background='transparent'">
                          <span style="font-size:0.78rem;color:var(--text3)" x-text="a.name"></span>
                          <span style="font-size:0.8rem;color:var(--warning)" x-text="'−' + $store.budget.fmtC(a.amount)"></span>
                        </div>
                      </template>
                    </div>

                    <!-- Free money total row -->
                    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:var(--surface2)">
                      <span style="font-size:0.875rem;font-weight:700">= Free money</span>
                      <span style="font-size:1.1rem;font-weight:800"
                        :style="{ color: $store.budget.freeBalance >= 0 ? 'var(--accent)' : 'var(--danger)' }"
                        x-text="$store.budget.fmtC($store.budget.freeBalance)"></span>
                    </div>
                  </div>
                </div>

                <!-- Monthly income vs expenses row -->
                <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px">
                  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px">
                    <div style="font-size:0.68rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);font-weight:600;margin-bottom:8px" x-text="$store.budget.t('monthly_income')"></div>
                    <div style="font-size:1.35rem;font-weight:800;color:var(--accent)" x-text="$store.budget.fmtC($store.budget.monthlyIncomeTotal)"></div>
                    <div style="font-size:0.72rem;color:var(--text3);margin-top:3px">from income sources</div>
                  </div>
                  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px">
                    <div style="font-size:0.68rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);font-weight:600;margin-bottom:8px" x-text="$store.budget.t('monthly_fixed')"></div>
                    <div style="font-size:1.35rem;font-weight:800;color:var(--warning)" x-text="$store.budget.fmtC($store.budget.monthlyFixedTotal)"></div>
                    <div style="font-size:0.72rem;color:var(--text3);margin-top:3px">fixed monthly costs</div>
                  </div>
                  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px">
                    <div style="font-size:0.68rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);font-weight:600;margin-bottom:8px">NET MONTHLY</div>
                    <div style="font-size:1.35rem;font-weight:800"
                      :style="{ color: $store.budget.netMonthly >= 0 ? 'var(--accent)' : 'var(--danger)' }"
                      x-text="$store.budget.fmtC($store.budget.netMonthly)"></div>
                    <div style="font-size:0.72rem;color:var(--text3);margin-top:3px">income − fixed costs</div>
                  </div>
                  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px">
                    <div style="font-size:0.68rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);font-weight:600;margin-bottom:8px" x-text="$store.budget.t('monthly_expenses')"></div>
                    <div style="font-size:1.35rem;font-weight:800;color:var(--danger)" x-text="$store.budget.fmtC($store.budget.monthlyExpenses)"></div>
                    <div style="font-size:0.72rem;color:var(--text3);margin-top:3px">logged this month</div>
                  </div>
                </div>

                <!-- Recent + Category spending -->
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
                    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)">
                      <h3 style="font-size:0.875rem;font-weight:700" x-text="$store.budget.t('recent_transactions')"></h3>
                      <button class="btn btn-ghost btn-sm" @click="$store.budget.navigate('transactions')" x-text="$store.budget.t('view_all')"></button>
                    </div>
                    <div x-show="!$store.budget.recentTransactions.length" class="empty-state" style="padding:32px"><p>No transactions yet</p></div>
                    <template x-for="tx in $store.budget.recentTransactions" :key="tx.id">
                      <div style="display:flex;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid var(--border);transition:var(--trans)"
                        onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background='transparent'">
                        <div style="width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0"
                          :style="{ background: tx.type === 'income' ? 'var(--accent-bg)' : 'rgba(239,68,68,0.1)' }">
                          <svg style="width:13px;height:13px" :style="{ color: tx.type === 'income' ? 'var(--accent)' : 'var(--danger)' }" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <line x1="12" :y1="tx.type === 'income' ? '19' : '5'" :y2="tx.type === 'income' ? '5' : '19'"/>
                            <polyline :points="tx.type === 'income' ? '5 12 12 5 19 12' : '5 12 12 19 19 12'"/>
                          </svg>
                        </div>
                        <div style="flex:1;min-width:0">
                          <div style="font-size:0.82rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"
                            x-text="tx.description || $store.budget.catName(tx.categoryId) || $store.budget.t(tx.type)"></div>
                          <div style="font-size:0.7rem;color:var(--text3)" x-text="$store.budget.fmtDate(tx.date)"></div>
                        </div>
                        <div style="font-size:0.88rem;font-weight:700;flex-shrink:0"
                          :style="{ color: tx.type === 'income' ? 'var(--accent)' : 'var(--danger)' }"
                          x-text="(tx.type === 'income' ? '+' : '−') + $store.budget.fmtC(tx.amount)"></div>
                      </div>
                    </template>
                  </div>

                  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
                    <div style="padding:14px 18px;border-bottom:1px solid var(--border)">
                      <h3 style="font-size:0.875rem;font-weight:700" x-text="$store.budget.t('spending_by_category')"></h3>
                    </div>
                    <div x-show="!$store.budget.categorySpending.length" class="empty-state" style="padding:32px"><p x-text="$store.budget.t('no_spending_data')"></p></div>
                    <div style="padding:6px 0">
                      <template x-for="cat in $store.budget.categorySpending" :key="cat.catId">
                        <div style="padding:8px 18px">
                          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
                            <div style="display:flex;align-items:center;gap:7px">
                              <div style="width:9px;height:9px;border-radius:50%" :style="{ background: cat.color }"></div>
                              <span style="font-size:0.8rem;font-weight:500" x-text="cat.name"></span>
                            </div>
                            <div style="display:flex;gap:8px;align-items:center">
                              <span style="font-size:0.7rem;color:var(--text3)" x-text="cat.pct + '%'"></span>
                              <span style="font-size:0.82rem;font-weight:600;color:var(--danger)" x-text="$store.budget.fmtC(cat.amount)"></span>
                            </div>
                          </div>
                          <div class="progress-bar">
                            <div class="progress-fill" :class="cat.pct > 80 ? 'bad' : cat.pct > 50 ? 'warn' : 'good'" :style="{ width: cat.pct + '%' }"></div>
                          </div>
                        </div>
                      </template>
                    </div>
                  </div>
                </div>
              </div>

              <!-- ════════════════════════════════════════════════
                   MONTHLY TRACKER VIEW
              ════════════════════════════════════════════════ -->
              <div x-show="$store.budget.activeView === 'tracker'">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">
                  <div>
                    <h1 style="font-size:1.3rem;font-weight:800;letter-spacing:-0.5px" x-text="$store.budget.t('nav_tracker')"></h1>
                    <p style="color:var(--text3);font-size:0.82rem;margin-top:2px">Track what you've paid this month</p>
                  </div>
                  <div style="display:flex;gap:8px">
                    <div class="stat-chip" :class="$store.budget.unpaidObligations > 0 ? 'bad' : 'good'">
                      <span class="stat-val" x-text="$store.budget.fmtC($store.budget.unpaidObligations)"></span>
                      <span class="stat-label">Still to pay</span>
                    </div>
                    <div class="stat-chip good">
                      <span class="stat-val" x-text="$store.budget.fmtC($store.budget.monthlyFixedTotal - $store.budget.unpaidObligations)"></span>
                      <span class="stat-label">Paid this month</span>
                    </div>
                  </div>
                </div>

                <div style="display:flex;flex-direction:column;gap:14px">
                  <template x-for="f in $store.budget.fixedExpenses.filter(x => x.active)" :key="f.id">
                    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">

                      <!-- Fixed expense header -->
                      <div style="display:flex;align-items:center;gap:14px;padding:14px 18px;border-bottom:1px solid var(--border);background:var(--surface2)">
                        <!-- Toggle: only for non-bills, non-category-tracked -->
                        <template x-if="!f.linkedCategoryId && (!f.items || f.items.length === 0)">
                          <button @click="$store.budget.toggleFixedPaid(f.id)"
                            style="width:22px;height:22px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:var(--trans)"
                            :style="{ borderColor: $store.budget.isFixedPaidThisMonth(f) ? 'var(--accent)' : 'var(--border)', background: $store.budget.isFixedPaidThisMonth(f) ? 'var(--accent)' : 'transparent' }">
                            <svg x-show="$store.budget.isFixedPaidThisMonth(f)" style="width:12px;height:12px;color:#fff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
                          </button>
                        </template>

                        <!-- Category-tracked indicator (food budget) -->
                        <template x-if="f.linkedCategoryId">
                          <div style="width:22px;height:22px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;flex-shrink:0"
                            :style="{ borderColor: $store.budget.fixedCategoryPct(f) >= 100 ? 'var(--danger)' : $store.budget.fixedCategoryPct(f) >= 75 ? 'var(--warning)' : 'var(--accent)' }">
                            <svg style="width:11px;height:11px" :style="{ color: $store.budget.fixedCategoryPct(f) >= 100 ? 'var(--danger)' : $store.budget.fixedCategoryPct(f) >= 75 ? 'var(--warning)' : 'var(--accent)' }" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                              <path d="M3 3v18h18"/><path d="M7 16l4-4 4 4 4-4"/>
                            </svg>
                          </div>
                        </template>

                        <div style="flex:1;min-width:0">
                          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                            <span style="font-size:0.9rem;font-weight:700" x-text="f.name"></span>
                            <!-- Category-tracked badge -->
                            <template x-if="f.linkedCategoryId">
                              <span class="badge" style="font-size:0.62rem"
                                :class="$store.budget.fixedCategoryPct(f) >= 100 ? 'badge-danger' : $store.budget.fixedCategoryPct(f) >= 75 ? 'badge-warning' : 'badge-accent'"
                                x-text="$store.budget.fixedCategoryPct(f) + '% spent'">
                              </span>
                            </template>
                            <!-- Toggle badge -->
                            <span x-show="!f.linkedCategoryId && $store.budget.isFixedPaidThisMonth(f) && (!f.items || f.items.length === 0)"
                              class="badge badge-accent" style="font-size:0.65rem">✓ paid</span>
                            <!-- Bills badge -->
                            <span x-show="f.items && f.items.length > 0">
                              <span class="badge" style="font-size:0.65rem"
                                :class="$store.budget.fixedUnpaidAmount(f) === 0 ? 'badge-accent' : 'badge-warning'"
                                x-text="(f.items.filter(i => $store.budget.isBillItemPaidThisMonth(i)).length) + '/' + f.items.length + ' paid'"></span>
                            </span>
                          </div>
                          <!-- Progress bar for category-tracked budgets -->
                          <template x-if="f.linkedCategoryId">
                            <div style="margin-top:7px">
                              <div class="progress-bar" style="height:5px">
                                <div class="progress-fill"
                                  :class="$store.budget.fixedCategoryPct(f) >= 100 ? 'bad' : $store.budget.fixedCategoryPct(f) >= 75 ? 'warn' : 'good'"
                                  :style="{ width: $store.budget.fixedCategoryPct(f) + '%' }">
                                </div>
                              </div>
                              <div style="display:flex;justify-content:space-between;font-size:0.7rem;color:var(--text3);margin-top:4px">
                                <span>spent <span style="color:var(--text);font-weight:600" x-text="$store.budget.fmtC($store.budget.fixedCategorySpent(f))"></span></span>
                                <span>remaining <span style="font-weight:600" :style="{ color: $store.budget.fixedCategoryRemaining(f) > 0 ? 'var(--accent)' : 'var(--danger)' }" x-text="$store.budget.fmtC($store.budget.fixedCategoryRemaining(f))"></span></span>
                              </div>
                            </div>
                          </template>
                        </div>

                        <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">
                          <div x-show="!f.linkedCategoryId" style="text-align:right">
                            <div style="font-size:0.95rem;font-weight:700;color:var(--warning)" x-text="$store.budget.fmtC(f.amount)"></div>
                            <div x-show="$store.budget.fixedUnpaidAmount(f) > 0 && $store.budget.fixedUnpaidAmount(f) < f.amount"
                              style="font-size:0.7rem;color:var(--danger)">
                              <span x-text="$store.budget.fmtC($store.budget.fixedUnpaidAmount(f))"></span> unpaid
                            </div>
                          </div>
                          <div x-show="f.linkedCategoryId" style="text-align:right">
                            <div style="font-size:0.95rem;font-weight:700;color:var(--warning)" x-text="$store.budget.fmtC(f.amount)"></div>
                            <div style="font-size:0.7rem;color:var(--text3)">budget/month</div>
                          </div>
                          <div style="display:flex;gap:2px">
                            <button class="btn-icon" @click="$store.budget.openEditFixed(f)">
                              <svg style="width:13px;height:13px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                            </button>
                            <template x-if="f.type === 'bills'">
                              <button class="btn-icon" @click="$store.budget.openAddBillItem(f.id)" title="Add bill item" style="color:var(--accent)">
                                <svg style="width:13px;height:13px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                              </button>
                            </template>
                          </div>
                        </div>
                      </div>

                      <!-- Bill sub-items -->
                      <template x-if="f.items && f.items.length > 0">
                        <div>
                          <template x-for="item in f.items" :key="item.id">
                            <div style="display:flex;align-items:center;gap:12px;padding:11px 18px 11px 28px;border-bottom:1px solid var(--border);transition:var(--trans)"
                              :style="{ opacity: $store.budget.isBillItemPaidThisMonth(item) ? '0.65' : '1' }"
                              onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background='transparent'">

                              <!-- Per-item toggle -->
                              <button @click="$store.budget.toggleBillItem(f.id, item.id)"
                                style="width:18px;height:18px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:var(--trans)"
                                :style="{ borderColor: $store.budget.isBillItemPaidThisMonth(item) ? 'var(--accent)' : 'var(--border)', background: $store.budget.isBillItemPaidThisMonth(item) ? 'var(--accent)' : 'transparent' }">
                                <svg x-show="$store.budget.isBillItemPaidThisMonth(item)" style="width:9px;height:9px;color:#fff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><polyline points="20 6 9 17 4 12"/></svg>
                              </button>

                              <span style="flex:1;font-size:0.84rem" :style="{ textDecoration: $store.budget.isBillItemPaidThisMonth(item) ? 'line-through' : 'none' }" x-text="item.name"></span>
                              <span style="font-size:0.84rem;font-weight:600" :style="{ color: $store.budget.isBillItemPaidThisMonth(item) ? 'var(--text3)' : 'var(--warning)' }" x-text="$store.budget.fmtC(item.amount)"></span>

                              <div style="display:flex;gap:1px">
                                <button class="btn-icon" style="width:26px;height:26px" @click="$store.budget.openEditBillItem(f.id, item)">
                                  <svg style="width:12px;height:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                                </button>
                                <button class="btn-icon" style="width:26px;height:26px;color:var(--danger)" @click="$store.budget.deleteBillItem(f.id, item.id)"
                                  onmouseover="this.style.background='rgba(239,68,68,0.1)'" onmouseout="this.style.background='transparent'">
                                  <svg style="width:12px;height:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
                                </button>
                              </div>
                            </div>
                          </template>
                        </div>
                      </template>

                    </div>
                  </template>

                  <!-- Add fixed expense -->
                  <button class="btn btn-secondary" @click="$store.budget.openAddFixed()" style="align-self:flex-start">
                    <svg style="width:13px;height:13px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    <span x-text="$store.budget.t('add_fixed')"></span>
                  </button>
                </div>
              </div>

              <!-- ════════════════════════════════════════════════
                   TRANSACTIONS VIEW
              ════════════════════════════════════════════════ -->
              <div x-show="$store.budget.activeView === 'transactions'">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px">
                  <h1 style="font-size:1.3rem;font-weight:800;letter-spacing:-0.5px" x-text="$store.budget.t('nav_transactions')"></h1>
                  <div style="display:flex;gap:8px">
                    <button class="btn btn-primary" @click="$store.budget.openAddTransaction('income')">
                      <svg style="width:13px;height:13px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                      <span x-text="$store.budget.t('add_income')"></span>
                    </button>
                    <button class="btn btn-secondary" @click="$store.budget.openAddTransaction('expense')">
                      <svg style="width:13px;height:13px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/></svg>
                      <span x-text="$store.budget.t('add_expense')"></span>
                    </button>
                  </div>
                </div>
                <!-- Filters -->
                <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
                  <select x-model="$store.budget.filterMonth" style="font-size:0.8rem;padding:6px 26px 6px 10px">
                    <template x-for="m in $store.budget.monthOptions" :key="m"><option :value="m" x-text="$store.budget.fmtMonthYear(m)"></option></template>
                  </select>
                  <select x-model="$store.budget.filterType" style="font-size:0.8rem;padding:6px 26px 6px 10px">

                    <option value="income" x-text="$store.budget.t('income')"></option>
                    <option value="expense" x-text="$store.budget.t('expense')"></option>
                  </select>
                  <select x-model="$store.budget.filterCategory" style="font-size:0.8rem;padding:6px 26px 6px 10px">
                    <option value="" x-text="$store.budget.t('all_categories')"></option>
                    <template x-for="c in $store.budget.categories" :key="c.id"><option :value="c.id" x-text="c.name"></option></template>
                  </select>
                  <input type="search" x-model="$store.budget.searchQ" :placeholder="$store.budget.t('search_placeholder')"
                    style="font-size:0.8rem;padding:6px 12px;flex:1;min-width:150px;max-width:240px"/>
                </div>
                <!-- Summary chips -->
                <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">
                  <div class="stat-chip good"><span class="stat-val" x-text="$store.budget.fmtC($store.budget.monthlyIncome)"></span><span class="stat-label" x-text="$store.budget.t('total_in')"></span></div>
                  <div class="stat-chip bad"><span class="stat-val" x-text="$store.budget.fmtC($store.budget.monthlyExpenses)"></span><span class="stat-label" x-text="$store.budget.t('total_out')"></span></div>
                  <div class="stat-chip" :class="($store.budget.monthlyIncome - $store.budget.monthlyExpenses) >= 0 ? 'good' : 'bad'">
                    <span class="stat-val" x-text="$store.budget.fmtC($store.budget.monthlyIncome - $store.budget.monthlyExpenses)"></span><span class="stat-label">Net logged</span>
                  </div>
                </div>
                <!-- Table -->
                <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
                  <div x-show="!$store.budget.filteredTransactions.length" class="empty-state">

                    <p x-text="$store.budget.t('no_transactions')"></p>
                  </div>
                  <table class="food-table" x-show="$store.budget.filteredTransactions.length">
                    <thead><tr>
                      <th>Date</th><th>Description</th><th>Category</th><th>Type</th>
                      <th style="text-align:right">Amount</th><th style="width:72px"></th>
                    </tr></thead>
                    <tbody>
                      <template x-for="tx in $store.budget.filteredTransactions" :key="tx.id">
                        <tr>
                          <td style="white-space:nowrap;color:var(--text2);font-size:0.78rem" x-text="$store.budget.fmtDate(tx.date)"></td>
                          <td style="font-size:0.875rem;font-weight:500" x-text="tx.description || '—'"></td>
                          <td>
                            <span x-show="tx.categoryId" style="display:inline-flex;align-items:center;gap:5px">
                              <span style="width:7px;height:7px;border-radius:50%" :style="{ background: $store.budget.catColor(tx.categoryId) }"></span>
                              <span style="font-size:0.78rem" x-text="$store.budget.catName(tx.categoryId)"></span>
                            </span>
                            <span x-show="!tx.categoryId" style="color:var(--text3);font-size:0.78rem">—</span>
                          </td>
                          <td><span class="badge" :class="tx.type === 'income' ? 'badge-accent' : 'badge-danger'" x-text="$store.budget.t(tx.type)"></span></td>
                          <td style="text-align:right;font-weight:700;font-size:0.88rem"
                            :style="{ color: tx.type === 'income' ? 'var(--accent)' : 'var(--danger)' }"
                            x-text="(tx.type === 'income' ? '+' : '−') + $store.budget.fmtC(tx.amount)"></td>
                          <td>
                            <div style="display:flex;gap:2px;justify-content:flex-end">
                              <button class="btn-icon" @click="$store.budget.openEditTransaction(tx)">
                                <svg style="width:13px;height:13px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                              </button>
                              <button class="btn-icon" @click="$store.budget.deleteTransaction(tx.id)" style="color:var(--danger)"
                                onmouseover="this.style.background='rgba(239,68,68,0.1)'" onmouseout="this.style.background='transparent'">
                                <svg style="width:13px;height:13px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
                              </button>
                            </div>
                          </td>
                        </tr>
                      </template>
                    </tbody>
                  </table>
                </div>
              </div>

              <!-- ════════════════════════════════════════════════
                   INCOME VIEW
              ════════════════════════════════════════════════ -->
              <div x-show="$store.budget.activeView === 'income'">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
                  <div>
                    <h1 style="font-size:1.3rem;font-weight:800;letter-spacing:-0.5px" x-text="$store.budget.t('nav_income')"></h1>
                    <p style="color:var(--text3);font-size:0.82rem;margin-top:2px">
                      Total: <span style="color:var(--accent);font-weight:700" x-text="$store.budget.fmtC($store.budget.monthlyIncomeTotal)"></span>/month
                    </p>
                  </div>
                  <button class="btn btn-primary" @click="$store.budget.openAddIncomeSource()">
                    <svg style="width:13px;height:13px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add Income Source
                  </button>
                </div>

                <div x-show="!$store.budget.incomeSources.length" class="empty-state"
                  style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
                  <p>No income sources yet</p>
                </div>

                <div x-show="$store.budget.incomeSources.length" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
                  <template x-for="s in $store.budget.incomeSources" :key="s.id">
                    <div style="display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border);transition:var(--trans)"
                      :style="{ opacity: s.active ? '1' : '0.5' }"
                      onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background='transparent'">
                      <div style="width:36px;height:36px;border-radius:8px;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0">
                        <svg style="width:16px;height:16px;color:var(--accent)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
                      </div>
                      <div style="flex:1">
                        <div style="font-size:0.9rem;font-weight:600" x-text="s.name"></div>
                        <span class="badge" :class="s.active ? 'badge-accent' : ''" style="font-size:0.65rem;margin-top:3px"
                          x-text="s.active ? 'active' : 'inactive'"></span>
                      </div>
                      <div style="font-size:1rem;font-weight:800;color:var(--accent)" x-text="$store.budget.fmtC(s.amount)"></div>
                      <div style="display:flex;gap:2px">
                        <button class="btn-icon" @click="$store.budget.openEditIncomeSource(s)">
                          <svg style="width:13px;height:13px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </button>
                        <button class="btn-icon" @click="$store.budget.deleteIncomeSource(s.id)" style="color:var(--danger)"
                          onmouseover="this.style.background='rgba(239,68,68,0.1)'" onmouseout="this.style.background='transparent'">
                          <svg style="width:13px;height:13px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
                        </button>
                      </div>
                    </div>
                  </template>
                  <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--surface2)">
                    <span style="font-size:0.8rem;font-weight:600;color:var(--text2)">Total monthly income</span>
                    <span style="font-size:1rem;font-weight:800;color:var(--accent)" x-text="$store.budget.fmtC($store.budget.monthlyIncomeTotal)"></span>
                  </div>
                </div>
              </div>

              <!-- ════════════════════════════════════════════════
                   FIXED EXPENSES VIEW
              ════════════════════════════════════════════════ -->
              <div x-show="$store.budget.activeView === 'fixed'">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
                  <div>
                    <h1 style="font-size:1.3rem;font-weight:800;letter-spacing:-0.5px" x-text="$store.budget.t('nav_fixed')"></h1>
                    <p style="color:var(--text3);font-size:0.82rem;margin-top:2px">
                      Total: <span style="color:var(--warning);font-weight:700" x-text="$store.budget.fmtC($store.budget.monthlyFixedTotal)"></span>/month
                    </p>
                  </div>
                  <button class="btn btn-primary" @click="$store.budget.openAddFixed()">
                    <svg style="width:13px;height:13px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    <span x-text="$store.budget.t('add_fixed')"></span>
                  </button>
                </div>

                <div x-show="!$store.budget.fixedExpenses.length" class="empty-state" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)">
                  <p x-text="$store.budget.t('no_fixed')"></p>
                </div>

                <div x-show="$store.budget.fixedExpenses.length" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
                  <template x-for="f in $store.budget.fixedExpenses" :key="f.id">
                    <div style="border-bottom:1px solid var(--border)" :style="{ opacity: f.active ? '1' : '0.5' }">
                      <div style="display:flex;align-items:center;gap:12px;padding:13px 18px;transition:var(--trans)"
                        onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background='transparent'">
                        <input type="checkbox" :checked="f.active" @change="$store.budget.toggleFixed(f.id)" style="width:15px;height:15px;cursor:pointer"/>
                        <div style="flex:1">
                          <div style="font-size:0.875rem;font-weight:600" x-text="f.name"></div>
                          <div style="font-size:0.72rem;color:var(--text3);margin-top:2px">
                            <span class="badge" style="font-size:0.62rem" x-text="f.type"></span>
                          </div>
                        </div>
                        <span style="font-size:0.95rem;font-weight:700;color:var(--warning)" x-text="$store.budget.fmtC(f.amount)"></span>
                        <div style="display:flex;gap:2px">
                          <button class="btn-icon" @click="$store.budget.openEditFixed(f)">
                            <svg style="width:13px;height:13px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                          </button>
                          <button class="btn-icon" @click="$store.budget.deleteFixed(f.id)" style="color:var(--danger)"
                            onmouseover="this.style.background='rgba(239,68,68,0.1)'" onmouseout="this.style.background='transparent'">
                            <svg style="width:13px;height:13px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
                          </button>
                        </div>
                      </div>
                    </div>
                  </template>
                  <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:var(--surface2)">
                    <span style="font-size:0.8rem;font-weight:600;color:var(--text2)">Total active</span>
                    <span style="font-size:1rem;font-weight:800;color:var(--warning)" x-text="$store.budget.fmtC($store.budget.monthlyFixedTotal)"></span>
                  </div>
                </div>
              </div>

              <!-- ════════════════════════════════════════════════
                   CATEGORIES VIEW
              ════════════════════════════════════════════════ -->
              <div x-show="$store.budget.activeView === 'categories'">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
                  <h1 style="font-size:1.3rem;font-weight:800;letter-spacing:-0.5px" x-text="$store.budget.t('nav_categories')"></h1>
                  <button class="btn btn-primary" @click="$store.budget.openAddCategory()">
                    <svg style="width:13px;height:13px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    <span x-text="$store.budget.t('add_category')"></span>
                  </button>
                </div>
                <div x-show="!$store.budget.categories.length" class="empty-state" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)">
                  <p x-text="$store.budget.t('no_categories')"></p>
                </div>
                <div x-show="$store.budget.categories.length" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px">
                  <template x-for="c in $store.budget.categories" :key="c.id">
                    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;transition:var(--trans)"
                      onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
                      <div style="width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0" :style="{ background: c.color + '22' }">
                        <div style="width:12px;height:12px;border-radius:50%" :style="{ background: c.color }"></div>
                      </div>
                      <div style="flex:1"><div style="font-size:0.875rem;font-weight:600" x-text="c.name"></div>
                        <span class="badge" :class="c.type === 'income' ? 'badge-accent' : c.type === 'both' ? 'badge-warning' : ''" style="font-size:0.62rem;margin-top:3px"
                          x-text="c.type"></span>
                      </div>
                      <div style="display:flex;gap:2px">
                        <button class="btn-icon" @click="$store.budget.openEditCategory(c)">
                          <svg style="width:12px;height:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </button>
                        <button class="btn-icon" @click="$store.budget.deleteCategory(c.id)" style="color:var(--danger)"
                          onmouseover="this.style.background='rgba(239,68,68,0.1)'" onmouseout="this.style.background='transparent'">
                          <svg style="width:12px;height:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
                        </button>
                      </div>
                    </div>
                  </template>
                </div>
              </div>

              <!-- ════════════════════════════════════════════════
                   PROJECTS VIEW
              ════════════════════════════════════════════════ -->
              <div x-show="$store.budget.activeView === 'projects'">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
                  <h1 style="font-size:1.3rem;font-weight:800;letter-spacing:-0.5px" x-text="$store.budget.t('nav_projects')"></h1>
                  <button class="btn btn-primary" @click="$store.budget.openAddProject()">
                    <svg style="width:13px;height:13px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    <span x-text="$store.budget.t('add_project')"></span>
                  </button>
                </div>
                <div x-show="!$store.budget.projects.length" class="empty-state" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)">
                  <p x-text="$store.budget.t('no_projects')"></p>
                </div>
                <div x-show="$store.budget.projects.length" style="display:grid;grid-template-columns:260px 1fr;gap:18px;align-items:start">
                  <!-- Project list -->
                  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
                    <template x-for="p in $store.budget.projects" :key="p.id">
                      <div class="sidebar-item" style="padding:13px 16px;border-bottom:1px solid var(--border);border-radius:0;cursor:pointer"
                        :class="{ active: $store.budget.activeProjectId === p.id }" @click="$store.budget.selectProject(p.id)">
                        <div style="flex:1;min-width:0">
                          <div style="font-size:0.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" x-text="p.name"></div>
                          <div style="font-size:0.7rem;color:var(--text3);margin-top:2px" x-text="$store.budget.fmtC($store.budget.projectTotalSpent(p)) + ' / ' + $store.budget.fmtC(p.totalBudget || $store.budget.projectTotalBudgeted(p))"></div>
                          <div x-show="p.isAllocation" class="badge badge-warning" style="font-size:0.6rem;margin-top:4px">🔒 allocation</div>
                          <div x-show="p.totalBudget > 0" class="progress-bar" style="margin-top:6px">
                            <div class="progress-fill" :class="$store.budget.projectProgress(p) > 90 ? 'bad' : $store.budget.projectProgress(p) > 70 ? 'warn' : 'good'" :style="{ width: $store.budget.projectProgress(p) + '%' }"></div>
                          </div>
                        </div>
                        <div class="item-actions">
                          <button class="btn-icon" @click.stop="$store.budget.openEditProject(p)" style="width:24px;height:24px"><svg style="width:11px;height:11px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
                          <button class="btn-icon" @click.stop="$store.budget.deleteProject(p.id)" style="width:24px;height:24px;color:var(--danger)"><svg style="width:11px;height:11px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg></button>
                        </div>
                      </div>
                    </template>
                  </div>
                  <!-- Project detail -->
                  <div x-show="$store.budget.activeProject">
                    <template x-if="$store.budget.activeProject">
                      <div>
                        <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;margin-bottom:14px">
                          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap">
                            <div>
                              <h2 style="font-size:1.1rem;font-weight:800" x-text="$store.budget.activeProject.name"></h2>
                              <p x-show="$store.budget.activeProject.description" style="color:var(--text2);font-size:0.82rem;margin-top:4px" x-text="$store.budget.activeProject.description"></p>
                              <div x-show="$store.budget.activeProject.isAllocation" class="badge badge-warning" style="margin-top:6px;font-size:0.68rem">
                                🔒 Locks <span x-text="$store.budget.fmtC($store.budget.projectRemaining($store.budget.activeProject))"></span> from balance
                              </div>
                            </div>
                            <button class="btn btn-secondary btn-sm" @click="$store.budget.openAddProjectItem()">
                              <svg style="width:12px;height:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                              <span x-text="$store.budget.t('add_item')"></span>
                            </button>
                          </div>

            <template x-for="toast in $store.budget.toasts" :key="toast.id">
              <div class="toast" :class="toast.type === 'error' ? 'toast-error' : 'toast-success'">
                <svg x-show="toast.type !== 'error'" style="width:13px;height:13px;flex-shrink:0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                <svg x-show="toast.type === 'error'" style="width:13px;height:13px;flex-shrink:0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                <span x-text="toast.msg"></span>
              </div>
            </template>
          </div>
        </div>
      </template>
    </div>

    <style>
      #sidebar { flex-shrink:0; width:0; overflow:hidden; transition:width 0.25s ease; }
      #sidebar.open { width:248px; }
      @media (max-width:600px) {
        #topbar > *:nth-child(n+3) { display:none !important; }
        #sidebar { position:fixed; top:0; left:0; height:100vh; z-index:200; transition:width 0.25s ease, box-shadow 0.25s ease; }
        #sidebar.open { width:min(275px, 85vw); box-shadow:4px 0 32px rgba(0,0,0,0.6); }
        #sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:199; }
        #sidebar.open ~ #sidebar-overlay, body:has(#sidebar.open) #sidebar-overlay { display:block; }
        .sidebar-mobile-header { display:flex !important; }
        #main-content { padding:16px !important; }
      }
      @media (min-width:601px) { .sidebar-mobile-header { display:none !important; } }
      @media (max-width:880px) {
        [style*="grid-template-columns:260px 1fr"] { grid-template-columns:1fr !important; }
        [style*="grid-template-columns:1fr 1fr"] { grid-template-columns:1fr !important; }
      }
    </style>

    <script type="module">
      import Alpine from "https://cdn.jsdelivr.net/npm/alpinejs@3/dist/module.esm.js";
      import { registerStore } from "./js/store.js";
      registerStore(Alpine);
      window.Alpine = Alpine;
      Alpine.start();
    </script>
  </body>
</html>
